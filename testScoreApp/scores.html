<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron McNeal's Test scores app</title>
    <script>
        let score1 = parseInt(prompt("Enter Test Score"));
        let score2 = parseInt(prompt("Enter Test Score"));
        let score3 = parseInt(prompt("Enter Test Score"));
        let score4 = parseInt(prompt("Enter Test Score"));
        let total = score1 + score2 + score3 + score4;
        let today = new Date();

        //Calculate Average
        let average = total/4;
    </script>
</head>
<body>
    <script>
        alert("Score 1: " + score1 + "\n" + "Score 2: " + score2 + 
        "\n" + "Score 3: " + score3 + "\n" + "Score 4: " + score4 + 
        "\n" + "Average Score: " + average + "\n\n" 
        + "Today's date and time is: " + today + "\n\n");
    </script>
    Thank you for using my application
</body>
</html>
